<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FillWrds — Word Search Game</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%234f46e5'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='900' font-size='18' fill='white'>F</text></svg>" />

  <!-- SEO -->
  <meta name="description" content="FillWrds is a free word search puzzle game. Find hidden words on the grid in English, Russian, Belarusian and Ukrainian. Play easy, medium or hard levels." />
  <meta name="keywords" content="word search, word game, puzzle, fillwords, филворды, find words, English, Russian, Belarusian, Ukrainian" />
  <meta name="author" content="FillWrds" />
  <link rel="canonical" href="https://fillwrds.github.io/fillwrds/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://fillwrds.github.io/fillwrds/" />
  <meta property="og:title"       content="FillWrds — Word Search Game" />
  <meta property="og:description" content="Free word search puzzle game in English, Russian, Belarusian and Ukrainian. Three difficulty levels." />
  <meta property="og:locale"      content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="FillWrds — Word Search Game" />
  <meta name="twitter:description" content="Free word search puzzle game in English, Russian, Belarusian and Ukrainian. Three difficulty levels." />

  <link rel="stylesheet" href="styles/global.css" />

  <!-- Web Components -->
  <script type="module" src="components/theme-select/theme-select.js"></script>
  <script type="module" src="components/lang-select/lang-select.js"></script>
  <script type="module" src="components/level-select/level-select.js"></script>
  <script type="module" src="components/word-list/word-list.js"></script>
  <script type="module" src="components/game-board/game-board.js"></script>
  <script type="module" src="components/win-modal/win-modal.js"></script>

  <!-- App controller -->
  <script type="module" src="core/app.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>FillWrds</h1>
    <div class="header-controls">
      <theme-select selected-theme="system"></theme-select>
      <lang-select selected-lang="en"></lang-select>
    </div>
  </header>

  <main class="app-main">

    <aside class="app-sidebar">

      <div class="card">
        <level-select selected-level="easy"></level-select>
      </div>

      <div class="card">
        <div class="custom-words-header">
          <label class="custom-words-label" for="custom-words" data-i18n="customWords">Custom words</label>
          <button class="custom-words-clear" id="btn-clear-words" type="button" data-i18n="clear" aria-label="Clear custom words">Clear</button>
        </div>
        <textarea
          id="custom-words"
          class="custom-words-input"
          placeholder="apple, banana, cherry…"
          data-i18n-placeholder="placeholder"
          rows="3"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        ></textarea>
        <p class="custom-words-hint" data-i18n="hint">Separate with commas. Leave empty to fetch automatically.</p>
      </div>

      <div class="card">
        <word-list></word-list>
      </div>

      <button class="btn-primary" id="btn-start" type="button">
        <span class="btn-spinner" aria-hidden="true"></span>
        <span class="btn-label" data-i18n="newGame">New Game</span>
      </button>

    </aside>

    <section class="app-board">
      <game-board></game-board>
    </section>

  </main>

  <win-modal></win-modal>
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

</body>
</html>
